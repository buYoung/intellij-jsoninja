# Query Help Tooltip
queryHelp.learnMore=Learn more
queryHelp.jsonpath.title=Jayway JsonPath Syntax
queryHelp.jsonpath.description=<b>Access</b><table><tr><td><code>$.field</code></td><td>field access</td></tr><tr><td><code>$.a.b</code></td><td>nested field</td></tr><tr><td><code>$..field</code></td><td>recursive search</td></tr></table><b>Array</b><table><tr><td><code>$.arr[0]</code></td><td>by index</td></tr><tr><td><code>$.arr[-1]</code></td><td>last item</td></tr><tr><td><code>$.arr[0:3]</code></td><td>range slice</td></tr><tr><td><code>$.arr[*]</code></td><td>all items</td></tr></table><b>Filter</b><table><tr><td><code>$.arr[?(@.age &gt; 18)]</code></td><td>conditional filter</td></tr><tr><td><code>$.arr[?(@.type=='error')]</code></td><td>match by value</td></tr></table><b>Function</b><table><tr><td><code>$.arr.length()</code></td><td>count elements</td></tr><tr><td><code>$.arr.min()</code></td><td>find min</td></tr></table>
queryHelp.jmespath.title=JMESPath Syntax
queryHelp.jmespath.description=<b>Access</b><table><tr><td><code>field</code></td><td>field access</td></tr><tr><td><code>a.b</code></td><td>nested field</td></tr></table><b>Array</b><table><tr><td><code>arr[0]</code></td><td>by index</td></tr><tr><td><code>arr[-1]</code></td><td>last item</td></tr><tr><td><code>arr[0:3]</code></td><td>range slice</td></tr></table><b>Projection</b><table><tr><td><code>arr[*].name</code></td><td>project array</td></tr><tr><td><code>*.field</code></td><td>project object</td></tr></table><b>Filter</b><table><tr><td><code>arr[?age &gt; &#96;18&#96;]</code></td><td>conditional filter</td></tr></table><b>Multi-select</b><table><tr><td><code>{name: name, id: id}</code></td><td>pick fields</td></tr></table><b>Function</b><table><tr><td><code>sort_by(arr, &amp;field)</code></td><td>sort results</td></tr><tr><td><code>contains(s, 'x')</code></td><td>contains check</td></tr></table>
queryHelp.jq.title=jq Filter Syntax
queryHelp.jq.description=<b>Access</b><table><tr><td><code>.field</code></td><td>field access</td></tr><tr><td><code>.a.b</code></td><td>nested field</td></tr></table><b>Array</b><table><tr><td><code>.arr[]</code></td><td>iterate all</td></tr><tr><td><code>.arr[0]</code></td><td>by index</td></tr><tr><td><code>.arr[2:5]</code></td><td>range slice</td></tr></table><b>Transform</b><table><tr><td><code>map(.field)</code></td><td>map fields</td></tr><tr><td><code>select(.age &gt; 18)</code></td><td>conditional filter</td></tr></table><b>Construct</b><table><tr><td><code>{a, b}</code></td><td>shorthand</td></tr><tr><td><code>{name: .field}</code></td><td>rename field</td></tr></table><b>Pipe</b><table><tr><td><code>.[] | .field</code></td><td>chaining</td></tr></table><b>Built-in</b><table><tr><td><code>length</code> <code>keys</code> <code>values</code> <code>to_entries</code></td><td>built-in functions</td></tr></table>

