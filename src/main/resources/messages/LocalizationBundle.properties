onboarding.tutorial.step1.detail=Add Tab is the same action as the + icon in the JSON Editor tab area on the right. Click it to create a new JSON working tab immediately.
onboarding.tutorial.step2.detail=Click Open JSON to open the file chooser. Once you pick a JSON file, its JSON data is loaded into the current JSON Editor tab so you can edit or run actions right away.
onboarding.tutorial.step3.before=Compact JSON with no indentation.
onboarding.tutorial.step3.after=Readable JSON with indentation and line breaks.
onboarding.tutorial.step5.before=Normal JSON text with quotes and special characters.
onboarding.tutorial.step5.after=Escaped JSON string that is safe to embed inside another string.
onboarding.tutorial.step7.before=Manually created sample data.
onboarding.tutorial.step7.after=Sample JSON generated instantly from Random Data Generator options.
onboarding.tutorial.step8.image.caption=Diff view preview
onboarding.tutorial.step8.sort.tooltip.title=Sort Keys
onboarding.tutorial.step8.sort.tooltip.body=In the Diff viewer, click this button to sort both JSON key orders instantly and compare changes more clearly.
onboarding.tutorial.step9.before=Find values manually and write query/path by hand.
onboarding.tutorial.step9.after=Use right-click actions on JSON data, run queries, and copy the selected node path with JSON \uACBD\uB85C \uBCF5\uC0AC.
