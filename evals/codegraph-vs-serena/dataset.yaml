# =============================================================================
# 코드 수정 시나리오 기반 벤치마크 데이터셋 (whole-repo scope, 2 cases)
# -----------------------------------------------------------------------------
# 목적: "실제로 코드를 수정하기 직전 엔지니어가 던지는 질문" 2가지를 리포 전체 범위에서
#       5개 탐색 백엔드(codegraph / serena / zoekt / rg+sg / bare)에 동일 프롬프트로 묻고,
#       소스에서 독립 산출한 gold 와 대조해 recall / precision 을 측정한다.
# 설계 근거:
#   - 기존 services/schema(6파일·2,759줄) 한정 파일럿은 대상이 너무 작아 brute-force(통독)로
#     풀려 도구 간 변별이 사라졌다. 그래서 본 데이터셋은 리포 전체(prod 146파일 + test)를 무대로 한다.
#   - 케이스는 2개만 둔다. 케이스 수보다 "수정 시나리오로서의 현실성 + 변별력"을 우선한다.
#   - M1 = 시그니처 변경 영향(blast radius): 역호출 + 타입 동명 구분 + DI 수신자.
#   - M2 = 동작 변경 전파(transitive impact closure): 다중 홉 역호출 폐포 + DI 홉 + 람다 간접.
#   - enum 분기 갱신 케이스는 의도적으로 배제했다: 모든 암이 enum 참조 ~15개를 비슷하게 노출하고,
#     "어떤 부분집합이 갱신 대상인가"는 도구가 결과를 돌려준 뒤 에이전트가 코드를 읽고 판단하는 몫이라
#     도구 능력이 아니라 에이전트 추론을 측정하게 된다(precision 이 채점 판단에 휘둘리는 메커니즘).
# =============================================================================

meta:
  provenance:
    git_commit: 1daf879beae6ecc853be6a7e496a240568bddea5
    git_tag: v1.12.1
    branch: main
    tracked_source_dirty: false      # gold 는 이 커밋 소스와 정확히 일치
    codegraph_db_sha256: 54e743b63439404afefbe033affabd5d4abe158e6686ca40942cbe808d7a333b
    db_freshness_verified: true
  scope: whole-repo (src/main/kotlin + src/test/kotlin). M3-W 한정 tree-sitter-wasm/src(Rust) 포함 — 전 암(A~F+H) 동일 범위로 재인덱싱(A안 확정).
  gold_provenance: 측정 대상 7개 도구(codegraph/serena/zoekt/rg+sg/bare/cocoindex/zoekt+ctags) 중 어느 것도 gold 산출에 사용하지 않음. M1/M2 는 rg 전수 추출 후 소스 직접 판독. M3-W/M3-L 은 git show v1.12.1 로 소스 직접 판독해 (file:line) 손산출(측정도구 무사용). codegraph CTE/그래프는 "후보 탐색"에만 쓰였고 정답 출처가 아님.
  matching_key: "M1 = 호출지점(file:line). M2 = (qualified_name) 함수 단위. M3-W = Kotlin 측+Rust 측 (file:line) 분리채점 후 합산. M3-L = (file:line). 라인 ±1 정규화(codegraph 1-based vs serena 0-based)는 채점기에서 흡수."

  # ---------------------------------------------------------------------------
  # 실행 전 선결조건 (공정성 — 인덱스 범위 정렬)
  # ---------------------------------------------------------------------------
  prerequisites:
    zoekt_reindex_required: true
    reason: >-
      M1·M2 gold 에 src/test 의 호출지점이 포함된다. 현재 zoekt 인덱스(kotlin_v16.00000.zoekt)는
      src/main(146파일)만 커버하므로, 테스트 호출지점을 구조적으로 찾을 수 없다. 이는 도구 능력 차이가
      아니라 인덱스 범위 아티팩트이므로 zoekt 암을 부당하게 깎는다. 실행 전 src/test 까지 포함해
      재인덱싱하고, 전 암의 검색 가능 범위(src/main + src/test)를 동일하게 맞춘다.
    action: "zoekt-index 로 src/main/kotlin + src/test/kotlin 을 함께 인덱싱한 뒤 sha 와 파일수를 기록한다."
    m3_reindex: >-
      M3 추가(7암×4케이스)에 맞춰 전 암을 v1.12.1+Rust(A안)로 재인덱싱: 추출본 .codegraph/src-v1.12.1
      (kt 159 + rs 24 = 183파일). codegraph(.codegraph/codegraph.db, 183파일·3379 nodes·7909 edges),
      zoekt plain(.codegraph/zoekt-index), zoekt+ctags(.codegraph/zoekt-ctags-index, 5059 심볼),
      cocoindex(cocoindex/index.sqlite, 1249청크 = kt 1053 + rs 196). 상세 sha·파일수는 PROVENANCE-m3.txt.

  # ---------------------------------------------------------------------------
  # 7개 암 (A~F + H_zoekt_ctags) — 기존 benchmark-design.md §3.0 의 동일 베이스 프롬프트를 그대로 재사용
  # {{ALLOWED_TOOLS_BLOCK}} 한 곳만 차등, 읽기전용·출력스키마·금지사항은 전 암 동일.
  # ---------------------------------------------------------------------------
  arms:
    A_codegraph: 'Bash 로 ''sqlite3 .codegraph/codegraph.db "..."'' 만. 소스 파일 Read/grep 금지.'
    B_serena:    'mcp__serena__* 읽기전용 도구만 (find_symbol, find_referencing_symbols, get_symbols_overview, search_for_pattern 등).'
    C_zoekt:     'Bash 로 zoekt 검색 CLI 만 (src/main + src/test 재인덱싱본 대상). 소스 직접 Read 금지.'
    D_rg_sg:     'Bash 로 rg(ripgrep), sg(ast-grep) 만. 그 외 명령/도구 금지. (이전 파일럿에서 D 가 sg 를 한 번도 안 썼으므로, 이번엔 구조 패턴 1회 이상 sg 사용을 권장하되 강제는 아님.)'
    E_bare:      'Claude Code 내장 Grep + Glob + Read 만. Bash 전면 금지(이전 파일럿에서 E 가 Bash grep/find 를 써 격리를 위반했으므로, 이번엔 Bash 를 차단해 순수 내장도구 베이스라인을 측정).'
    F_cocoindex: 'Bash 로 cocoindex 벡터검색 스크립트(``python query.py "..." --top-k N``)만. 소스 직접 Read/grep/sqlite3 금지. 시맨틱 임베딩 top-k 청크 검색만으로 답을 도출. 인덱스/스크립트는 cocoindex/ 디렉터리 참조.'
    H_zoekt_ctags: 'Bash 로 zoekt 검색 CLI 만 (ctags 활성 재인덱싱본 대상, sym: 검색 권장). 소스 직접 Read 금지.'

  # F(cocoindex) 암 메모: 다른 5개 암은 정확-매칭형(graph/LSP/trigram/text)이나 cocoindex 는
  # tree-sitter 청킹 + 트랜스포머 임베딩 + 벡터 top-k 의 *시맨틱* 패러다임이다. 동일 케이스(M1·M2)에
  # 6번째 암으로 추가해 "임베딩 검색이 전수·정확 회수 과제에서 어떻게 거동하는가"를 측정한다.
  # 출력이 청크(파일+라인범위)라 gold 의 (file:line) 와는 청크 라인추정으로 환산해 채점(라인 ±1 동일).
  # provenance: 인덱스는 v1.12.1 소스(.kt 159파일)를 RecursiveSplitter(chunk_size=1000B, kotlin) 청킹 +
  # all-MiniLM-L6-v2(384d, normalize) 임베딩 → SQLite 1053청크. 상세·재현은 cocoindex/README.md.

  output_schema: |
    JSON 한 개만 출력:
    {
      "answers": [ { "qualified_name": "...", "kind": "method|class|function|callsite", "file": "...", "line": <int|null> } ],
      "reasoning_brief": "1~3문장",
      "tool_calls_count": <int>
    }

  metrics:
    accuracy: [recall, precision, f1]
    efficiency: [tool_calls_count, output_tokens, cache_read_tokens, wall_clock_seconds, estimated_cost_usd]
    robustness: [hallucination_count, trap_inclusion_count]   # 함정(동명·반대방향) 포함 수

