cases:

  # ---------------------------------------------------------------------------
  - id: M1
    title: "시그니처 변경 영향 범위 (blast radius)"
    category: reverse-call + type-disambiguation + DI-receiver
    modification_scenario: >-
      JsonFormatterService.formatJson(json, formatState, sortOverride) 의 시그니처를 바꾸려 한다
      (예: 파라미터 추가). 컴파일 에러 없이 안전하게 바꾸려면 이 '서비스 메서드'를 호출하는 모든 지점을
      찾아 함께 수정해야 한다. 테스트도 시그니처 변경에 깨지므로 수정 대상에 포함된다.
    question: >-
      JsonFormatterService 클래스에 정의된 formatJson(json, formatState, sortOverride) 메서드를
      '직접 호출하는' 모든 호출지점(파일과 라인)을 나열하라. 프로덕션(src/main)과 테스트(src/test) 모두 포함한다.
      주의: 같은 이름 formatJson 을 가진 다른 메서드(JsoninjaPanelPresenter.formatJson)의 호출은 제외한다.

    discriminators:
      - "동명 메서드 2개: JsonFormatterService.formatJson(서비스, line 127) vs JsoninjaPanelPresenter.formatJson(프레젠터, line 66). 이름만 매칭하면 프레젠터 호출 2건을 오탐으로 포함하게 됨(타입 구분 필요)."
      - "DI 수신자: GenerateRandomJsonAction.kt:60 은 project.service<JsonFormatterService>().formatJson(...) 형태. serena 의 IntelliJ DI 수신자 미해소가 드러나는 지점."
      - "테스트 꼬리: src/test 의 21개 호출지점. 인덱스 범위(zoekt) 와 수동 BFS 종료(텍스트 암)의 변별축."
      - "스코프 정렬 필수: 테스트 포함이 gold 이므로 zoekt 재인덱싱 전엔 zoekt 가 구조적으로 불리."

