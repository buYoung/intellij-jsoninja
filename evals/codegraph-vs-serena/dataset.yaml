      찾아야 하며, 문자열 'kotlin'/'kt' 과대매칭에 휘둘리면 안 된다.
    question: >-
      SupportedLanguage.KOTLIN enum 상수를 심볼로서 참조하는 모든 지점(when 분기 포함)을 나열하라.
