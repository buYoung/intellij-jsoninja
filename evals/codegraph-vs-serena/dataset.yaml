  # ---------------------------------------------------------------------------
  - id: M2
    title: "동작 변경 전파 범위 (transitive impact closure)"
    category: transitive reverse-call + DI-hop + lambda-indirection
    modification_scenario: >-
      TreeSitterWasmRuntime.getOrCreate() 의 동작(WASM 런타임 핸들의 재사용/생성 정책)을 바꾸려 한다.
      이 변경이 직접·간접적으로 영향을 미치는 프로덕션 함수 전부를 알아야 회귀 위험을 가늠할 수 있다.
    question: >-
      TreeSitterWasmRuntime.getOrCreate() 가 (직접 또는 다른 함수를 거쳐 간접적으로) 호출되는,
      프로덕션 코드(src/main)의 모든 함수를 호출 깊이와 함께 나열하라. 즉 getOrCreate 의 transitive
      역호출 폐포다. IntelliJ 진입점(AnAction.actionPerformed / DialogWrapper 생성) 위쪽은 제외한다.

    discriminators:
      - "DI 수신자 홉 2개: (d2) TypeToJsonGenerationService 가 project.getService(TypeDeclarationAnalyzerService) 로 받은 수신자에 analyzeSource 호출 / (d3) TypeToJsonDialogPresenter 가 project.getService(TypeToJsonGenerationService) 로 받은 수신자에 generate 호출. serena 는 이 두 홉(명시적 타입 없는 DI 수신자)에서 체인이 끊길 것으로 예측."
      - "람다 간접: (d3) generate 호출이 schedulePreview 안의 computePreview = { ... } 람다(previewExecutor.submit 에 전달) 내부에 있음. 정적 귀속 난이도."
      - "다중 홉 깊이 5: 텍스트/LSP 암은 수동 BFS 로 한 단계씩 올라가야 하며 중간에 조기 종료할 위험. codegraph 는 재귀 CTE 로 one-shot."
      - "동명/유사 함정: getOrCreateContext(JsonDiffService) 는 이름만 비슷한 다른 메서드. TypeToJsonDialogView.updateLanguage(:148) 는 inputPanel 에 대한 다른 updateLanguage. JsonToType 방향(JsonToTypeConversionService / JsonToTypeDialogPresenter)은 tree-sitter 를 안 거쳐 폐포에 없음."

    gold:
      unit: function (qualified_name)
      production_closure:      # getOrCreate 의 transitive 역호출 폐포 (8 함수)
        - depth: 1
          qualified_name: "com.livteam.jsoninja.services.typeConversion.TypeDeclarationAnalyzerService.analyzeSource"
          reached_via: "TreeSitterWasmRuntime.getOrCreate() 직접 호출 (object, TypeDeclarationAnalyzerService.kt:27)"
        - depth: 2
          qualified_name: "com.livteam.jsoninja.services.typeConversion.TypeToJsonGenerationService.generate"
          reached_via: "analyzerService.analyzeSource — DI 수신자 project.getService (TypeToJsonGenerationService.kt:13,27)"
        - depth: 3
          qualified_name: "com.livteam.jsoninja.ui.dialog.convertType.TypeToJsonDialogPresenter.schedulePreview"
          reached_via: "generationService.generate — DI 수신자 + computePreview 람다 내부 (TypeToJsonDialogPresenter.kt:20,111)"
        - depth: 4
          qualified_name: "com.livteam.jsoninja.ui.dialog.convertType.TypeToJsonDialogPresenter.<init>"
          reached_via: "schedulePreview() (TypeToJsonDialogPresenter.kt:32)"
        - depth: 4
          qualified_name: "com.livteam.jsoninja.ui.dialog.convertType.TypeToJsonDialogPresenter.updateLanguage"
          reached_via: "schedulePreview() (TypeToJsonDialogPresenter.kt:42)"
        - depth: 4
          qualified_name: "com.livteam.jsoninja.ui.dialog.convertType.TypeToJsonDialogPresenter.bindView"
          reached_via: "setOnStateChanged { ... schedulePreview() } 람다 (TypeToJsonDialogPresenter.kt:81)"
        - depth: 5
          qualified_name: "com.livteam.jsoninja.ui.dialog.convertType.ConvertTypeDialogPresenter.<init>"
          reached_via: "TypeToJsonDialogPresenter(...) 생성 (ConvertTypeDialogPresenter.kt:22)"
        - depth: 5
          qualified_name: "com.livteam.jsoninja.ui.dialog.convertType.ConvertTypeDialogPresenter.syncLanguage"
          reached_via: "typeToJsonPresenter.updateLanguage(language) (ConvertTypeDialogPresenter.kt:79)"
      total_gold_functions: 8
      cut_boundary: "ConvertTypeDialogPresenter 위(=DialogWrapper/AnAction 진입점)는 폐포에서 제외. 명시적 컷."
      traps_must_exclude:
        - "com.livteam.jsoninja.services.JsonDiffService.getOrCreateContext  (이름 유사, 무관 메서드)"
        - "com.livteam.jsoninja.ui.dialog.convertType.TypeToJsonDialogView.updateLanguage  (inputPanel 대상 동명 메서드, :148)"
        - "com.livteam.jsoninja.ui.dialog.convertType.JsonToTypeDialogPresenter.schedulePreview  (반대 방향, getOrCreate 미도달)"
        - "ConvertTypeDialogPresenter.syncLanguage 내 jsonToTypePresenter.updateLanguage 분기  (반대 방향)"
      test_tail:             # 별도 sub-score (transitive 말단 회수 변별축). 폐포 상의 analyzeSource/generate 를 호출하는 통합테스트.
        - "src/test/.../typeConversion/TypeConversionWasmIntegrationTest.kt  (analyzeSource/generate 경유)"
        - "src/test/.../typeConversion/TypeConversionWasmIntegrationV2Test.kt"
        - "src/test/.../typeConversion/TypeConversionWasmIntegrationV3Test.kt"

  # ---------------------------------------------------------------------------
  - id: M3-W
    title: "언어 간 WASM ABI seam (cross-language binding)"
    category: cross-language-binding + string-literal-export + rust-fn-def
    modification_scenario: >-
      Kotlin 호스트가 Rust WASM 모듈의 export 를 이름(문자열)으로 바인딩하는 ABI 경계를 바꾸려 한다.
      변경하려면 Kotlin 측 바인딩 지점과 그에 대응하는 Rust 측 #[no_mangle] 정의를 모두 찾아야 한다.
    question: >-
      Kotlin 호스트가 Rust WASM 모듈의 export 를 이름으로 바인딩하는 모든 지점과, 그에 대응하는 Rust 측
      #[no_mangle] pub extern "C" 정의를 모두 나열하라. 대상 ABI: analyze_source, get_last_error, alloc, dealloc.
    scope: "whole-repo (src/main/kotlin + src/test/kotlin + tree-sitter-wasm/src)"
    discriminators:
      - "Kotlin 측 export 인자는 문자열 리터럴(\"alloc\" 등)이라 심볼이 아님 → 단일언어 정밀 인덱서(serena-kotlin 등)의 맹점."
      - "Rust 측은 #[no_mangle] pub extern \"C\" fn 정의 → rust-analyzer/codegraph(.rs 지원 시)는 포착 가능."
      - "generic 토큰: alloc/dealloc 은 텍스트 오탐 큼 → 변별 핵심은 distinctive 한 analyze_source/get_last_error."
      - "2차 사용 함정: WasmMemoryBridge.kt 의 runtimeHandle.alloc/.dealloc 은 ABI 바인딩 지점이 아니라 사용처."

    gold:
      unit: binding/definition (file:line)
      matching_key: "Kotlin 측 (file:line) + Rust 측 (file:line), 분리 채점 후 합산. 라인 ±1 정규화."
      kotlin_sites:          # instance.export("...") 바인딩 (4)
        - "src/main/kotlin/com/livteam/jsoninja/services/treesitter/TreeSitterWasmRuntime.kt:61"   # export("alloc")
        - "src/main/kotlin/com/livteam/jsoninja/services/treesitter/TreeSitterWasmRuntime.kt:62"   # export("dealloc")
        - "src/main/kotlin/com/livteam/jsoninja/services/treesitter/TreeSitterWasmRuntime.kt:63"   # export("analyze_source")
        - "src/main/kotlin/com/livteam/jsoninja/services/treesitter/TreeSitterWasmRuntime.kt:64"   # export("get_last_error")
      rust_sites:            # #[no_mangle] pub extern "C" fn 정의 (4)
        - "tree-sitter-wasm/src/lib.rs:25"    # pub extern "C" fn alloc
        - "tree-sitter-wasm/src/lib.rs:30"    # pub extern "C" fn dealloc
        - "tree-sitter-wasm/src/lib.rs:92"    # pub extern "C" fn analyze_source
        - "tree-sitter-wasm/src/lib.rs:121"   # pub extern "C" fn get_last_error
      total_gold_sites: 8
      traps_must_exclude:
        - "src/main/kotlin/com/livteam/jsoninja/services/treesitter/WasmMemoryBridge.kt:19"   # runtimeHandle.alloc 2차 사용 (ABI 바인딩 아님)
        - "src/main/kotlin/com/livteam/jsoninja/services/treesitter/WasmMemoryBridge.kt:36"   # runtimeHandle.dealloc 2차 사용 (ABI 바인딩 아님)
      notes:
        - "lib.rs 의 #[no_mangle] pub extern \"C\" export 는 총 12개이나 Kotlin instance.export() 바인딩이 있는 것은 4종뿐. 나머지 8개(parser_create:35/parser_destroy:40/tree_parse:45/parse:57/tree_query:66/query_execute:81/tree_destroy:111/get_supported_languages:116)는 gold 스코프 밖."
        - "가설: 텍스트 암(C/D/E/H)은 Kotlin·Rust 양측 텍스트 매칭 → 승리 / 단일언어 정밀 암은 Kotlin 측 문자열 바인딩 미포착 → 서열 역전."

